<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="50%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="80" x2="1200" y2="80" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="160" x2="1200" y2="160" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="320" x2="1200" y2="320" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="1100" y1="0" x2="1100" y2="630" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Version badge -->
  <g transform="translate(60, 50)">
    <rect x="0" y="0" width="65" height="28" rx="14" fill="#0ea5e9" fill-opacity="0.4" stroke="#38bdf8" stroke-opacity="0.5"/>
    <text x="32" y="19" text-anchor="middle" fill="#7dd3fc" font-size="12" font-weight="700">v5.1</text>
  </g>

  <!-- Title -->
  <text x="60" y="140" fill="#ffffff" font-size="42" font-weight="800" letter-spacing="-1">Partners Matching Manager</text>
  <text x="60" y="195" fill="#93c5fd" font-size="28" font-weight="600">Payroll Formula Enhancement</text>
  <text x="60" y="230" fill="#93c5fd" font-size="28" font-weight="600">&amp; Mobile Responsive Cards</text>

  <!-- Left card: Payroll formula -->
  <g transform="translate(60, 270)">
    <rect x="0" y="0" width="500" height="280" rx="16" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.1"/>
    <!-- Formula header -->
    <text x="30" y="40" fill="#fbbf24" font-size="14" font-weight="700">PAYROLL FORMULA v5.1</text>
    <!-- Formula -->
    <rect x="30" y="55" width="440" height="50" rx="8" fill="#ffffff" fill-opacity="0.08"/>
    <text x="250" y="86" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="600">(Rate x Hours) + Role Bonus + Field Bonus</text>
    <!-- Worker row mockup -->
    <g transform="translate(30, 125)">
      <text x="0" y="15" fill="#fbbf24" font-size="20">&#x1F451;</text>
      <text x="30" y="15" fill="#e2e8f0" font-size="13" font-weight="600">Team Leader</text>
      <rect x="140" y="0" width="70" height="24" rx="6" fill="#ffffff" fill-opacity="0.1"/>
      <text x="175" y="16" text-anchor="middle" fill="#94a3b8" font-size="11">15,000</text>
      <text x="218" y="16" fill="#64748b" font-size="13">x</text>
      <rect x="232" y="0" width="50" height="24" rx="6" fill="#ffffff" fill-opacity="0.1"/>
      <text x="257" y="16" text-anchor="middle" fill="#94a3b8" font-size="11">8h</text>
      <text x="290" y="16" fill="#64748b" font-size="13">+</text>
      <rect x="304" y="0" width="60" height="24" rx="6" fill="url(#amberGrad)" stroke="#f59e0b" stroke-opacity="0.3"/>
      <text x="334" y="16" text-anchor="middle" fill="#fbbf24" font-size="11">30,000</text>
      <text x="372" y="16" fill="#64748b" font-size="13">+</text>
      <rect x="386" y="0" width="55" height="24" rx="6" fill="#ffffff" fill-opacity="0.1"/>
      <text x="413" y="16" text-anchor="middle" fill="#94a3b8" font-size="11">20,000</text>
    </g>
    <g transform="translate(30, 160)">
      <text x="0" y="15" fill="#94a3b8" font-size="20">&#x1F464;</text>
      <text x="30" y="15" fill="#e2e8f0" font-size="13" font-weight="600">Member</text>
      <rect x="140" y="0" width="70" height="24" rx="6" fill="#ffffff" fill-opacity="0.1"/>
      <text x="175" y="16" text-anchor="middle" fill="#94a3b8" font-size="11">12,000</text>
      <text x="218" y="16" fill="#64748b" font-size="13">x</text>
      <rect x="232" y="0" width="50" height="24" rx="6" fill="#ffffff" fill-opacity="0.1"/>
      <text x="257" y="16" text-anchor="middle" fill="#94a3b8" font-size="11">6h</text>
      <text x="290" y="16" fill="#64748b" font-size="13">+</text>
      <rect x="304" y="0" width="60" height="24" rx="6" fill="#ffffff" fill-opacity="0.1"/>
      <text x="334" y="16" text-anchor="middle" fill="#94a3b8" font-size="11">0</text>
      <text x="372" y="16" fill="#64748b" font-size="13">+</text>
      <rect x="386" y="0" width="55" height="24" rx="6" fill="#ffffff" fill-opacity="0.1"/>
      <text x="413" y="16" text-anchor="middle" fill="#94a3b8" font-size="11">15,000</text>
    </g>
    <!-- Labels -->
    <text x="334" y="210" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">Role</text>
    <text x="413" y="210" text-anchor="middle" fill="#7dd3fc" font-size="10" font-weight="600">Field</text>
    <!-- Total -->
    <rect x="30" y="220" width="440" height="35" rx="8" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-opacity="0.3"/>
    <text x="250" y="243" text-anchor="middle" fill="#34d399" font-size="15" font-weight="700">TOTAL = &#x20A9;170,000 + &#x20A9;87,000</text>
  </g>

  <!-- Right card: Mobile responsive -->
  <g transform="translate(600, 270)">
    <rect x="0" y="0" width="540" height="280" rx="16" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.1"/>
    <text x="30" y="40" fill="#7dd3fc" font-size="14" font-weight="700">RESPONSIVE CARD LAYOUT</text>

    <!-- PC icon -->
    <g transform="translate(30, 60)">
      <rect x="0" y="0" width="220" height="130" rx="8" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.15"/>
      <text x="110" y="20" text-anchor="middle" fill="#64748b" font-size="10">PC (&gt;640px) TABLE</text>
      <!-- Mini table -->
      <line x1="10" y1="30" x2="210" y2="30" stroke="#475569" stroke-width="0.5"/>
      <text x="15" y="28" fill="#94a3b8" font-size="8">Partner</text>
      <text x="80" y="28" fill="#94a3b8" font-size="8">Count</text>
      <text x="125" y="28" fill="#94a3b8" font-size="8">Hours</text>
      <text x="175" y="28" fill="#94a3b8" font-size="8">Total</text>
      <rect x="10" y="35" width="200" height="14" rx="2" fill="#ffffff" fill-opacity="0.04"/>
      <rect x="10" y="53" width="200" height="14" rx="2" fill="#ffffff" fill-opacity="0.04"/>
      <rect x="10" y="71" width="200" height="14" rx="2" fill="#ffffff" fill-opacity="0.04"/>
      <rect x="10" y="89" width="200" height="14" rx="2" fill="#ffffff" fill-opacity="0.04"/>
      <text x="110" y="120" text-anchor="middle" fill="#64748b" font-size="9">hidden sm:block</text>
    </g>

    <!-- Arrow -->
    <text x="280" y="135" text-anchor="middle" fill="#fbbf24" font-size="24">&#x2194;</text>

    <!-- Mobile icon -->
    <g transform="translate(310, 55)">
      <rect x="30" y="0" width="150" height="200" rx="12" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.15"/>
      <text x="105" y="20" text-anchor="middle" fill="#64748b" font-size="10">Mobile (&lt;640px) CARDS</text>
      <!-- Mini cards -->
      <rect x="40" y="30" width="130" height="45" rx="6" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.1"/>
      <text x="50" y="46" fill="#e2e8f0" font-size="9" font-weight="600">Kim Partner</text>
      <text x="160" y="46" text-anchor="end" fill="#34d399" font-size="9" font-weight="700">&#x20A9;170K</text>
      <rect x="47" y="53" width="50" height="14" rx="3" fill="#ffffff" fill-opacity="0.05"/>
      <rect x="103" y="53" width="50" height="14" rx="3" fill="#ffffff" fill-opacity="0.05"/>
      <rect x="40" y="85" width="130" height="45" rx="6" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.1"/>
      <text x="50" y="101" fill="#e2e8f0" font-size="9" font-weight="600">Lee Partner</text>
      <text x="160" y="101" text-anchor="end" fill="#34d399" font-size="9" font-weight="700">&#x20A9;87K</text>
      <rect x="47" y="108" width="50" height="14" rx="3" fill="#ffffff" fill-opacity="0.05"/>
      <rect x="103" y="108" width="50" height="14" rx="3" fill="#ffffff" fill-opacity="0.05"/>
      <rect x="40" y="140" width="130" height="45" rx="6" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.1"/>
      <text x="50" y="156" fill="#e2e8f0" font-size="9" font-weight="600">Park Partner</text>
      <text x="160" y="156" text-anchor="end" fill="#34d399" font-size="9" font-weight="700">&#x20A9;92K</text>
      <rect x="47" y="163" width="50" height="14" rx="3" fill="#ffffff" fill-opacity="0.05"/>
      <rect x="103" y="163" width="50" height="14" rx="3" fill="#ffffff" fill-opacity="0.05"/>
      <text x="105" y="215" text-anchor="middle" fill="#64748b" font-size="9">sm:hidden</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="60" y="600" fill="#64748b" font-size="13">NEXT X R&amp;D</text>
  <text x="1140" y="600" text-anchor="end" fill="#64748b" font-size="13">KJ Partners System</text>
</svg>
