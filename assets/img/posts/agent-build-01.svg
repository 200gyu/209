<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR','Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a1246"/>
      <stop offset="0.5" stop-color="#1a1440"/>
      <stop offset="1" stop-color="#0c2b3a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="-5%" r="75%">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#ffffff" opacity="0.06"/>
    </pattern>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b9bff"/>
      <stop offset="0.5" stop-color="#c4a7ff"/>
      <stop offset="1" stop-color="#67e8f9"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- category pill -->
  <g transform="translate(80,96)">
    <rect x="0" y="0" width="256" height="48" rx="24" fill="#a855f7" opacity="0.2"/>
    <text x="128" y="32" text-anchor="middle" font-size="24" font-weight="700" fill="#d8b4fe">에이전트 제작기 #1</text>
  </g>

  <!-- title -->
  <text x="80" y="292" font-size="88" font-weight="800" fill="#ffffff">문제 정의</text>
  <text x="80" y="378" font-size="40" font-weight="600" fill="url(#accent)">주간 운영 리포트 에이전트</text>

  <!-- flow -->
  <g transform="translate(80,452)" font-size="24" font-weight="700">
    <g><rect x="0" y="0" width="130" height="52" rx="12" fill="#ffffff" opacity="0.08"/><text x="65" y="34" text-anchor="middle" fill="#e8eaff">사용자</text></g>
    <text x="150" y="34" fill="#8b9bff" font-size="30">→</text>
    <g transform="translate(184,0)"><rect x="0" y="0" width="150" height="52" rx="12" fill="#6d5efc" opacity="0.25"/><text x="75" y="34" text-anchor="middle" fill="#cdbcff">에이전트</text></g>
    <text x="352" y="34" fill="#8b9bff" font-size="30">→</text>
    <g transform="translate(386,0)"><rect x="0" y="0" width="130" height="52" rx="12" fill="#ffffff" opacity="0.08"/><text x="65" y="34" text-anchor="middle" fill="#e8eaff">초안</text></g>
    <text x="534" y="34" fill="#8b9bff" font-size="30">→</text>
    <g transform="translate(568,0)"><rect x="0" y="0" width="170" height="52" rx="12" fill="#22d3ee" opacity="0.18"/><text x="85" y="34" text-anchor="middle" fill="#7fe7f5">사람 검수</text></g>
  </g>

  <text x="1120" y="560" text-anchor="end" font-size="34" font-weight="800" fill="#ffffff" opacity="0.9">209</text>
</svg>
