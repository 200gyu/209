<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="50%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="80" x2="1200" y2="80" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="160" x2="1200" y2="160" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="320" x2="1200" y2="320" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="1100" y1="0" x2="1100" y2="630" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Version badge -->
  <g transform="translate(60, 50)">
    <rect x="0" y="0" width="65" height="28" rx="14" fill="#10b981" fill-opacity="0.4" stroke="#34d399" stroke-opacity="0.5"/>
    <text x="32" y="19" text-anchor="middle" fill="#6ee7b7" font-size="12" font-weight="700">v5.3</text>
  </g>

  <!-- Title -->
  <text x="60" y="140" fill="#ffffff" font-size="42" font-weight="800" letter-spacing="-1">Partners Matching Manager</text>
  <text x="60" y="195" fill="#93c5fd" font-size="28" font-weight="600">Production Data Cutover</text>
  <text x="60" y="230" fill="#93c5fd" font-size="28" font-weight="600">3-Month Real Data + 3.3% Deduction</text>

  <!-- Left card: Mock → Production pipeline -->
  <g transform="translate(60, 270)">
    <rect x="0" y="0" width="480" height="280" rx="16" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.1"/>
    <text x="25" y="40" fill="#fbbf24" font-size="14" font-weight="700">MOCK &#x2192; PRODUCTION</text>

    <!-- Mock box -->
    <g transform="translate(25, 60)">
      <rect x="0" y="0" width="130" height="70" rx="10" fill="#f97316" fill-opacity="0.15" stroke="#f97316" stroke-opacity="0.4"/>
      <text x="65" y="28" text-anchor="middle" fill="#fdba74" font-size="12" font-weight="700">Mock Mode</text>
      <text x="65" y="46" text-anchor="middle" fill="#94a3b8" font-size="10">import.meta.env.DEV</text>
      <text x="65" y="60" text-anchor="middle" fill="#94a3b8" font-size="10">local only</text>
    </g>

    <text x="180" y="100" fill="#64748b" font-size="20">&#x27A1;</text>

    <!-- SQL Editor box -->
    <g transform="translate(215, 60)">
      <rect x="0" y="0" width="130" height="70" rx="10" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-opacity="0.4"/>
      <text x="65" y="28" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="700">SQL Editor</text>
      <text x="65" y="46" text-anchor="middle" fill="#94a3b8" font-size="10">postgres role</text>
      <text x="65" y="60" text-anchor="middle" fill="#94a3b8" font-size="10">bypass RLS</text>
    </g>

    <text x="370" y="100" fill="#64748b" font-size="20">&#x27A1;</text>

    <!-- Prod box -->
    <g transform="translate(405, 60)">
      <rect x="0" y="0" width="55" height="70" rx="10" fill="url(#greenGrad)" stroke="#34d399" stroke-opacity="0.5"/>
      <text x="28" y="42" text-anchor="middle" fill="#6ee7b7" font-size="22">&#x2601;</text>
    </g>

    <!-- RLS shield note -->
    <g transform="translate(25, 155)">
      <rect x="0" y="0" width="435" height="45" rx="10" fill="#ef4444" fill-opacity="0.1" stroke="#ef4444" stroke-opacity="0.3"/>
      <text x="15" y="20" fill="#fca5a5" font-size="12" font-weight="700">&#x1F6E1; RLS blocked anon INSERT on payroll_records</text>
      <text x="15" y="36" fill="#94a3b8" font-size="10">Security policy worked as designed — even against the developer</text>
    </g>

    <!-- Deduction formula -->
    <g transform="translate(25, 215)">
      <rect x="0" y="0" width="435" height="45" rx="10" fill="#ffffff" fill-opacity="0.06"/>
      <text x="15" y="20" fill="#7dd3fc" font-size="12" font-weight="700">&#x1F9EE; Net Pay = Gross &#x2212; (Gross &#xD7; 3.3%)</text>
      <text x="15" y="36" fill="#94a3b8" font-size="10">Deduction &amp; net-pay columns across table / cards / live inputs</text>
    </g>
  </g>

  <!-- Right card: 3-month stats -->
  <g transform="translate(580, 270)">
    <rect x="0" y="0" width="560" height="280" rx="16" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.1"/>
    <text x="25" y="40" fill="#7dd3fc" font-size="14" font-weight="700">&#x1F4CA; 3-MONTH PRODUCTION DATA</text>

    <!-- Month rows -->
    <g transform="translate(25, 60)">
      <rect x="0" y="0" width="510" height="42" rx="8" fill="#ffffff" fill-opacity="0.06"/>
      <text x="15" y="26" fill="#e2e8f0" font-size="13" font-weight="700">MAY</text>
      <text x="120" y="26" fill="#94a3b8" font-size="12">338 records</text>
      <text x="260" y="26" fill="#94a3b8" font-size="12">125 sites</text>
      <text x="495" y="26" text-anchor="end" fill="#6ee7b7" font-size="13" font-weight="700">&#x20A9;40,114,000</text>

      <rect x="0" y="50" width="510" height="42" rx="8" fill="#ffffff" fill-opacity="0.06"/>
      <text x="15" y="76" fill="#e2e8f0" font-size="13" font-weight="700">JUN</text>
      <text x="120" y="76" fill="#94a3b8" font-size="12">365 records</text>
      <text x="260" y="76" fill="#94a3b8" font-size="12">128 sites</text>
      <text x="495" y="76" text-anchor="end" fill="#6ee7b7" font-size="13" font-weight="700">&#x20A9;44,754,000</text>

      <rect x="0" y="100" width="510" height="42" rx="8" fill="#ffffff" fill-opacity="0.06"/>
      <text x="15" y="126" fill="#e2e8f0" font-size="13" font-weight="700">JUL</text>
      <text x="120" y="126" fill="#94a3b8" font-size="12">223 records</text>
      <text x="260" y="126" fill="#94a3b8" font-size="12">71 sites</text>
      <text x="495" y="126" text-anchor="end" fill="#6ee7b7" font-size="13" font-weight="700">&#x20A9;26,854,000</text>
    </g>

    <!-- Total -->
    <g transform="translate(25, 215)">
      <rect x="0" y="0" width="510" height="45" rx="10" fill="url(#greenGrad)" stroke="#34d399" stroke-opacity="0.4"/>
      <text x="15" y="28" fill="#6ee7b7" font-size="13" font-weight="700">TOTAL &#xB7; 80 partners &#xB7; 324 sites &#xB7; 926 records</text>
      <text x="495" y="28" text-anchor="end" fill="#34d399" font-size="15" font-weight="800">&#x20A9;111,722,000</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="60" y="600" fill="#64748b" font-size="13">NEXT X R&amp;D</text>
  <text x="1140" y="600" text-anchor="end" fill="#64748b" font-size="13">KJ Partners System</text>
</svg>