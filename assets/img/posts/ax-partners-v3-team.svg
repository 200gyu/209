    <rect x="0" y="0" width="480" height="180" rx="16" fill="#fff" fill-opacity="0.06" stroke="#fff" stroke-opacity="0.1"/>
    <text x="20" y="28" fill="#ef4444" fill-opacity="0.7" font-size="12" font-weight="700">BEFORE (v2) — 1:1 단일 배정</text>
