    <text x="35" y="64" fill="#fff" fill-opacity="0.8" font-size="13" font-weight="600">홍길동 고객</text>
    <rect x="150" y="50" width="42" height="18" rx="9" fill="#fbbf24" fill-opacity="0.15"/>
    <text x="171" y="63" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600">대기</text>
    <text x="35" y="84" fill="#fff" fill-opacity="0.4" font-size="10">제주시 연동 123</text>
    <text x="35" y="100" fill="#fff" fill-opacity="0.4" font-size="10">2026-07-18</text>
    <text x="35" y="120" fill="#93c5fd" fill-opacity="0.8" font-size="11" font-weight="600">담당: 강미경</text>
    <!-- Only one person indicator -->
    <rect x="35" y="135" width="60" height="16" rx="4" fill="#ef4444" fill-opacity="0.1"/>
    <text x="65" y="146" text-anchor="middle" fill="#ef4444" fill-opacity="0.6" font-size="8">1명만 배정</text>
  </g>

  <!-- Arrow between cards -->
  <g transform="translate(578, 300)">
    <text x="0" y="0" fill="#a78bfa" font-size="28">→</text>
  </g>

  <!-- After card -->
  <g transform="translate(640, 220)">
    <rect x="0" y="0" width="480" height="180" rx="16" fill="#fff" fill-opacity="0.06" stroke="#a78bfa" stroke-opacity="0.25"/>
    <text x="20" y="28" fill="#22c55e" fill-opacity="0.9" font-size="12" font-weight="700">AFTER (v3) — 1:N 팀 배정</text>
    <!-- Assignment card mockup -->
    <rect x="20" y="40" width="440" height="125" rx="10" fill="#fff" fill-opacity="0.05" stroke="#a78bfa" stroke-opacity="0.12"/>
    <text x="35" y="64" fill="#fff" fill-opacity="0.8" font-size="13" font-weight="600">홍길동 고객</text>
    <rect x="150" y="50" width="42" height="18" rx="9" fill="#fbbf24" fill-opacity="0.15"/>
    <text x="171" y="63" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600">대기</text>
    <rect x="200" y="50" width="36" height="18" rx="9" fill="#fff" fill-opacity="0.08"/>
    <text x="218" y="63" text-anchor="middle" fill="#fff" fill-opacity="0.5" font-size="9">3명</text>
    <text x="35" y="84" fill="#fff" fill-opacity="0.4" font-size="10">제주시 연동 123</text>
    <text x="35" y="100" fill="#fff" fill-opacity="0.4" font-size="10">2026-07-18</text>
    <text x="35" y="120" fill="#93c5fd" fill-opacity="0.9" font-size="11" font-weight="600">👑 팀장: 강미경</text>
    <text x="35" y="138" fill="#a78bfa" fill-opacity="0.8" font-size="11">👥 팀원: 김경숙1, 박지연</text>
    <!-- Team indicator -->
    <rect x="380" y="115" width="65" height="38" rx="8" fill="#22c55e" fill-opacity="0.08" stroke="#22c55e" stroke-opacity="0.2"/>
    <text x="412" y="133" text-anchor="middle" fill="#22c55e" fill-opacity="0.7" font-size="8" font-weight="600">TEAM</text>
    <text x="412" y="147" text-anchor="middle" fill="#22c55e" fill-opacity="0.5" font-size="8">1+N</text>
  </g>

  <!-- Tech badges -->
  <g transform="translate(80, 430)">
    <rect x="0" y="0" width="100" height="26" rx="13" fill="#fff" fill-opacity="0.08" stroke="#fff" stroke-opacity="0.12"/>
    <text x="50" y="17" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">PostgreSQL</text>
    <rect x="110" y="0" width="80" height="26" rx="13" fill="#fff" fill-opacity="0.08" stroke="#fff" stroke-opacity="0.12"/>
    <text x="150" y="17" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">UUID[]</text>
    <rect x="200" y="0" width="115" height="26" rx="13" fill="#fff" fill-opacity="0.08" stroke="#fff" stroke-opacity="0.12"/>
    <text x="257" y="17" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">PostgREST Alias</text>
    <rect x="325" y="0" width="80" height="26" rx="13" fill="#fff" fill-opacity="0.08" stroke="#fff" stroke-opacity="0.12"/>
    <text x="365" y="17" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">Vanilla JS</text>
    <rect x="415" y="0" width="68" height="26" rx="13" fill="#fff" fill-opacity="0.08" stroke="#fff" stroke-opacity="0.12"/>
    <text x="449" y="17" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">Vercel</text>
  </g>

  <!-- Title -->
  <text x="60" y="505" fill="#fff" font-size="34" font-weight="800" letter-spacing="-0.5">파트너스 매칭 매니저 v3</text>
  <text x="60" y="545" fill="#fff" fill-opacity="0.7" font-size="18">팀 배정 시스템 — 팀장 + 팀원 다중 배정 체계</text>
  <text x="60" y="580" fill="#c4b5fd" font-size="14">NEXT X AX Solution · KJ Partners · Series #5</text>
</svg>
