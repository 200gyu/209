<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <linearGradient id="bgg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c1020"/><stop offset="0.5" stop-color="#141a33"/><stop offset="1" stop-color="#0a0f22"/>
    </linearGradient>
    <linearGradient id="xg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/><stop offset="0.55" stop-color="#6366f1"/><stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="vg" cx="72%" cy="30%" r="60%">
      <stop offset="0" stop-color="#4f46e5" stop-opacity="0.35"/><stop offset="1" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bgg)"/>
  <rect width="1200" height="630" fill="url(#vg)"/>

  <!-- wordmark -->
  <text x="120" y="330" font-size="150" font-weight="800" letter-spacing="2" fill="#eef2ff">NEXT</text>

  <!-- X emblem with circuit spokes -->
  <g transform="translate(770,250)">
    <!-- circuit spokes -->
    <g stroke="#3b82f6" stroke-width="4" opacity="0.55" fill="none" stroke-linecap="round">
      <path d="M60 -30 L120 -80"/><path d="M120 60 L185 55"/><path d="M40 120 L60 185"/>
      <path d="M-30 60 L-90 90"/>
    </g>
    <g fill="#60a5fa"><circle cx="122" cy="-82" r="6"/><circle cx="187" cy="55" r="6"/><circle cx="60" cy="187" r="6"/></g>
    <g fill="#a78bfa"><circle cx="-92" cy="90" r="6"/><circle cx="150" cy="-20" r="5"/><circle cx="-20" cy="150" r="5"/></g>
    <!-- X strokes -->
    <g stroke="url(#xg)" stroke-width="42" stroke-linecap="round">
      <line x1="0" y1="0" x2="150" y2="150"/>
      <line x1="150" y1="0" x2="0" y2="150"/>
    </g>
  </g>

  <text x="122" y="400" font-size="40" font-weight="600" letter-spacing="10" fill="#9aa4c8">AI TRANSFORMATION</text>
  <text x="122" y="500" font-size="34" font-weight="700" fill="#c7d2fe">AX · 업무 자동화 솔루션 연구소</text>
  <text x="122" y="548" font-size="26" font-weight="500" fill="#8a93b8">주식회사 넥스트엑스 (NEXT X Inc.)</text>
</svg>
