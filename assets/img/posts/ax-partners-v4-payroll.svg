    <rect x="0" y="0" width="520" height="200" rx="16" fill="#fff" fill-opacity="0.06" stroke="#fff" stroke-opacity="0.1"/>
    <text x="20" y="30" fill="#818cf8" font-size="14" font-weight="700">&#x1F4CA; Dashboard</text>

    <!-- Stat cards -->
    <rect x="15" y="45" width="115" height="55" rx="10" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-opacity="0.2"/>
    <text x="72" y="67" text-anchor="middle" fill="#93c5fd" font-size="9">Total Paid</text>
    <text x="72" y="88" text-anchor="middle" fill="#fff" font-size="14" font-weight="800">&#xA5;3.2M</text>

    <rect x="140" y="45" width="115" height="55" rx="10" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-opacity="0.2"/>
    <text x="197" y="67" text-anchor="middle" fill="#6ee7b7" font-size="9">Records</text>
    <text x="197" y="88" text-anchor="middle" fill="#fff" font-size="14" font-weight="800">24</text>

    <rect x="265" y="45" width="115" height="55" rx="10" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-opacity="0.2"/>
    <text x="322" y="67" text-anchor="middle" fill="#fde68a" font-size="9">Workers</text>
    <text x="322" y="88" text-anchor="middle" fill="#fff" font-size="14" font-weight="800">12</text>

    <rect x="390" y="45" width="115" height="55" rx="10" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-opacity="0.2"/>
    <text x="447" y="67" text-anchor="middle" fill="#c4b5fd" font-size="9">Avg Rate</text>
    <text x="447" y="88" text-anchor="middle" fill="#fff" font-size="14" font-weight="800">&#xA5;14K</text>

    <!-- Bar chart -->
    <g transform="translate(15, 115)">
      <rect x="0" y="40" width="60" height="45" rx="4" fill="#3b82f6" fill-opacity="0.5"/>
      <text x="30" y="95" text-anchor="middle" fill="#93c5fd" font-size="8">Kim</text>
      <rect x="70" y="25" width="60" height="60" rx="4" fill="#3b82f6" fill-opacity="0.6"/>
      <text x="100" y="95" text-anchor="middle" fill="#93c5fd" font-size="8">Park</text>
      <rect x="140" y="50" width="60" height="35" rx="4" fill="#3b82f6" fill-opacity="0.4"/>
      <text x="170" y="95" text-anchor="middle" fill="#93c5fd" font-size="8">Lee</text>
      <rect x="210" y="15" width="60" height="70" rx="4" fill="#fbbf24" fill-opacity="0.6"/>
      <text x="240" y="95" text-anchor="middle" fill="#fde68a" font-size="8">Choi</text>
      <rect x="280" y="35" width="60" height="50" rx="4" fill="#3b82f6" fill-opacity="0.45"/>
      <text x="310" y="95" text-anchor="middle" fill="#93c5fd" font-size="8">Jung</text>
      <rect x="350" y="55" width="60" height="30" rx="4" fill="#3b82f6" fill-opacity="0.35"/>
      <text x="380" y="95" text-anchor="middle" fill="#93c5fd" font-size="8">Han</text>
      <rect x="420" y="45" width="60" height="40" rx="4" fill="#3b82f6" fill-opacity="0.4"/>
      <text x="450" y="95" text-anchor="middle" fill="#93c5fd" font-size="8">Yoo</text>
    </g>
  </g>

  <!-- Title -->
  <text x="60" y="470" fill="#fff" font-size="36" font-weight="800">
    Partners Manager v4
  </text>
  <text x="60" y="510" fill="#93c5fd" font-size="22" font-weight="600">
    Payroll Management System
  </text>

  <!-- Subtitle -->
  <text x="60" y="550" fill="#a5b4fc" font-size="14">
    Per-Worker Rate x Hours  |  Real-time Calculation  |  Monthly Statistics Dashboard
  </text>

  <!-- Company badge -->
  <g transform="translate(60, 572)">
    <rect x="0" y="0" width="30" height="22" rx="6" fill="#fff" fill-opacity="0.15"/>
    <text x="15" y="16" text-anchor="middle" fill="#fff" font-size="9" font-weight="800">KJ</text>
    <text x="40" y="15" fill="#64748b" font-size="11">KJ Partners  ·  Payroll &amp; Matching Platform</text>
  </g>

  <!-- Tech badges -->
  <g transform="translate(900, 570)">
    <rect x="0" y="0" width="70" height="22" rx="11" fill="#3ecf8e" fill-opacity="0.2" stroke="#3ecf8e" stroke-opacity="0.3"/>
    <text x="35" y="15" text-anchor="middle" fill="#3ecf8e" font-size="9" font-weight="600">Supabase</text>
    <rect x="80" y="0" width="55" height="22" rx="11" fill="#38bdf8" fill-opacity="0.2" stroke="#38bdf8" stroke-opacity="0.3"/>
    <text x="107" y="15" text-anchor="middle" fill="#38bdf8" font-size="9" font-weight="600">Tailwind</text>
    <rect x="145" y="0" width="90" height="22" rx="11" fill="#a78bfa" fill-opacity="0.2" stroke="#a78bfa" stroke-opacity="0.3"/>
    <text x="190" y="15" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="600">Vanilla JS</text>
  </g>
</svg>
