    <text x="75" y="52" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">개별 급여 입력</text>
    <text x="75" y="68" text-anchor="middle" fill="#fde68a" font-size="9">Rate x Hours</text>
  </g>

  <line x1="400" y1="135" x2="425" y2="135" stroke="#a78bfa" stroke-opacity="0.5" stroke-width="2"/>
  <polygon points="425,130 435,135 425,140" fill="#a78bfa" fill-opacity="0.5"/>

  <!-- Card 3: Real-time Calc -->
  <g transform="translate(440, 95)">
    <rect x="0" y="0" width="140" height="80" rx="14" fill="url(#cardGrad)" stroke="#34d399" stroke-opacity="0.3" stroke-width="1.5"/>
    <text x="70" y="30" text-anchor="middle" fill="#34d399" font-size="20">&#x26A1;</text>
    <text x="70" y="52" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">실시간 계산</text>
    <text x="70" y="68" text-anchor="middle" fill="#6ee7b7" font-size="9">Auto Total</text>
  </g>

  <line x1="590" y1="135" x2="615" y2="135" stroke="#a78bfa" stroke-opacity="0.5" stroke-width="2"/>
  <polygon points="615,130 625,135 615,140" fill="#a78bfa" fill-opacity="0.5"/>

  <!-- Card 4: Dashboard -->
  <g transform="translate(630, 95)">
    <rect x="0" y="0" width="150" height="80" rx="14" fill="url(#cardGrad)" stroke="#818cf8" stroke-opacity="0.3" stroke-width="1.5"/>
    <text x="75" y="30" text-anchor="middle" fill="#818cf8" font-size="20">&#x1F4CA;</text>
    <text x="75" y="52" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">급여 대시보드</text>
    <text x="75" y="68" text-anchor="middle" fill="#a5b4fc" font-size="9">Stats + Table</text>
  </g>

  <line x1="790" y1="135" x2="815" y2="135" stroke="#a78bfa" stroke-opacity="0.5" stroke-width="2"/>
  <polygon points="815,130 825,135 815,140" fill="#a78bfa" fill-opacity="0.5"/>

