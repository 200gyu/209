  <g transform="translate(830, 95)">
    <rect x="0" y="0" width="100" height="80" rx="14" fill="url(#goldGrad)" stroke="#fbbf24" stroke-opacity="0.4" stroke-width="1.5"/>
    <text x="50" y="30" text-anchor="middle" fill="#fbbf24" font-size="20">&#x1F680;</text>
