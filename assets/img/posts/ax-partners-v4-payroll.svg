    <rect x="170" y="80" width="90" height="24" rx="6" fill="#fff" fill-opacity="0.08" stroke="#fbbf24" stroke-opacity="0.3"/>
    <text x="215" y="97" text-anchor="middle" fill="#fde68a" font-size="11">&#xA5;15,000</text>
    <text x="285" y="95" fill="#fff" font-size="12">&#xD7;</text>
    <rect x="300" y="80" width="60" height="24" rx="6" fill="#fff" fill-opacity="0.08" stroke="#34d399" stroke-opacity="0.3"/>
    <text x="330" y="97" text-anchor="middle" fill="#6ee7b7" font-size="11">8h</text>
    <text x="380" y="95" fill="#fff" font-size="12">=</text>
    <text x="420" y="96" fill="#fbbf24" font-size="12" font-weight="700">&#xA5;120,000</text>

    <!-- Row 2 -->
