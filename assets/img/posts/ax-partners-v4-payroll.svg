<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="50%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="80" x2="1200" y2="80" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="160" x2="1200" y2="160" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="320" x2="1200" y2="320" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#fff" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#fff" stroke-width="1"/>
    <line x1="1100" y1="0" x2="1100" y2="630" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Version badge -->
  <g transform="translate(60, 50)">
    <rect x="0" y="0" width="55" height="28" rx="14" fill="#7c3aed" fill-opacity="0.4" stroke="#a78bfa" stroke-opacity="0.5"/>
    <text x="27" y="19" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="700">v4</text>
  </g>

  <!-- Feature flow: Assignments → Payroll Input → Calc → Dashboard → v4 -->

  <!-- Card 1: Completed Assignments -->
  <g transform="translate(60, 95)">
    <rect x="0" y="0" width="130" height="80" rx="14" fill="url(#cardGrad)" stroke="#fff" stroke-opacity="0.15" stroke-width="1"/>
    <text x="65" y="30" text-anchor="middle" fill="#fff" font-size="20">&#x2705;</text>
    <text x="65" y="52" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">완료 배정</text>
    <text x="65" y="68" text-anchor="middle" fill="#93c5fd" font-size="9">Completed Jobs</text>
  </g>

  <line x1="200" y1="135" x2="225" y2="135" stroke="#a78bfa" stroke-opacity="0.5" stroke-width="2"/>
  <polygon points="225,130 235,135 225,140" fill="#a78bfa" fill-opacity="0.5"/>

  <!-- Card 2: Worker Input -->
  <g transform="translate(240, 95)">
    <rect x="0" y="0" width="150" height="80" rx="14" fill="url(#cardGrad)" stroke="#fbbf24" stroke-opacity="0.3" stroke-width="1.5"/>
