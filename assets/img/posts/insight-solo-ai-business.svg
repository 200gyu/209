<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR','Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1030"/>
      <stop offset="0.5" stop-color="#241640"/>
      <stop offset="1" stop-color="#2b1a12"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="10%" r="72%">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="10%" cy="90%" r="60%">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#ffffff" opacity="0.06"/>
    </pattern>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- category pill -->
  <g transform="translate(80,92)">
    <rect x="0" y="0" width="252" height="48" rx="24" fill="#f59e0b" opacity="0.18"/>
    <text x="126" y="32" text-anchor="middle" font-size="23" font-weight="700" fill="#fbbf24">인사이트 · 참고자료</text>
  </g>

  <!-- play button -->
  <g transform="translate(80,190)">
    <circle cx="34" cy="34" r="34" fill="#ff0000" opacity="0.9"/>
    <path d="M25 18 L54 34 L25 50 Z" fill="#ffffff"/>
  </g>

  <!-- title -->
  <text x="176" y="238" font-size="60" font-weight="800" fill="#ffffff">직원 0명, 월 4억</text>
  <text x="80" y="322" font-size="60" font-weight="800" fill="#ffffff">1인 AI 기업의 공식</text>
  <text x="80" y="392" font-size="34" font-weight="600" fill="url(#accent)">피터 레벨스 전략 분석 + 바이브 코딩 실습</text>

  <!-- keywords -->
  <g transform="translate(80,452)" font-size="24" font-weight="700">
    <g><rect x="0" y="0" width="118" height="52" rx="12" fill="#ffffff" opacity="0.08"/><text x="59" y="34" text-anchor="middle" fill="#e8eaff">다작</text></g>
    <g transform="translate(134,0)"><rect x="0" y="0" width="150" height="52" rx="12" fill="#ffffff" opacity="0.08"/><text x="75" y="34" text-anchor="middle" fill="#e8eaff">99% 마진</text></g>
    <g transform="translate(300,0)"><rect x="0" y="0" width="150" height="52" rx="12" fill="#ffffff" opacity="0.08"/><text x="75" y="34" text-anchor="middle" fill="#e8eaff">재포장</text></g>
    <g transform="translate(466,0)"><rect x="0" y="0" width="200" height="52" rx="12" fill="#ffffff" opacity="0.08"/><text x="100" y="34" text-anchor="middle" fill="#e8eaff">바이브 코딩</text></g>
  </g>

  <text x="1120" y="560" text-anchor="end" font-size="34" font-weight="800" fill="#ffffff" opacity="0.9">209</text>
</svg>
