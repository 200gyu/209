<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR','Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0d1326"/><stop offset="0.5" stop-color="#161d3a"/><stop offset="1" stop-color="#1e1a44"/></linearGradient>
    <radialGradient id="glow" cx="80%" cy="10%" r="72%"><stop offset="0" stop-color="#6366f1" stop-opacity="0.5"/><stop offset="1" stop-color="#6366f1" stop-opacity="0"/></radialGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.6" fill="#fff" opacity="0.06"/></pattern>
    <linearGradient id="ac" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#a5b4fc"/><stop offset="1" stop-color="#7dd3fc"/></linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Framework building blocks illustration -->
  <g transform="translate(880,90)" opacity="0.35">
    <!-- Component blocks -->
    <rect x="0" y="0" width="80" height="60" rx="8" fill="#a5b4fc" opacity="0.5"/>
    <text x="40" y="38" text-anchor="middle" font-size="13" font-weight="700" fill="#e0e7ff">Component</text>
    <rect x="90" y="0" width="80" height="60" rx="8" fill="#a5b4fc" opacity="0.5"/>
    <text x="130" y="38" text-anchor="middle" font-size="13" font-weight="700" fill="#e0e7ff">State</text>
    <rect x="180" y="0" width="80" height="60" rx="8" fill="#a5b4fc" opacity="0.5"/>
    <text x="220" y="38" text-anchor="middle" font-size="13" font-weight="700" fill="#e0e7ff">Routing</text>
    <!-- Framework base -->
    <rect x="-10" y="72" width="280" height="40" rx="8" fill="#6366f1" opacity="0.35"/>
    <text x="130" y="98" text-anchor="middle" font-size="15" font-weight="700" fill="#c7d2fe">Framework</text>
    <!-- PRD doc -->
    <rect x="20" y="130" width="100" height="70" rx="6" fill="#fff" opacity="0.12"/>
    <text x="70" y="158" text-anchor="middle" font-size="11" font-weight="600" fill="#c7d2fe">PRD</text>
    <line x1="35" y1="170" x2="105" y2="170" stroke="#c7d2fe" stroke-width="1" opacity="0.4"/>
    <line x1="35" y1="180" x2="90" y2="180" stroke="#c7d2fe" stroke-width="1" opacity="0.3"/>
    <line x1="35" y1="190" x2="100" y2="190" stroke="#c7d2fe" stroke-width="1" opacity="0.2"/>
    <!-- JSON mock -->
    <rect x="140" y="130" width="110" height="70" rx="6" fill="#fff" opacity="0.12"/>
    <text x="195" y="155" text-anchor="middle" font-size="10" font-weight="600" fill="#7dd3fc" font-family="monospace">{"mock": true}</text>
    <text x="195" y="172" text-anchor="middle" font-size="10" fill="#7dd3fc" font-family="monospace" opacity="0.6">{"price": 320}</text>
    <text x="195" y="189" text-anchor="middle" font-size="10" fill="#7dd3fc" font-family="monospace" opacity="0.4">{"id": 1}</text>
  </g>

  <g transform="translate(80,90)"><rect width="190" height="48" rx="24" fill="#6366f1" opacity="0.22"/><text x="95" y="32" text-anchor="middle" font-size="23" font-weight="700" fill="#c7d2fe">🛠️ Dev &amp; DevOps</text></g>
  <text x="80" y="248" font-size="58" font-weight="800" fill="#fff">웹 서비스의 뼈대를 세우는 법</text>
  <text x="80" y="335" font-size="48" font-weight="800" fill="url(#ac)">프레임워크 · PRD · 목업 데이터</text>
  <text x="80" y="405" font-size="28" font-weight="500" fill="#aab0d6">컴포넌트·상태·라우팅, AI와 기획서 쓰기, 백엔드 없이 만들기</text>

  <g transform="translate(80,458)" font-size="22" font-weight="700">
    <g><rect width="140" height="50" rx="12" fill="#fff" opacity="0.08"/><text x="70" y="33" text-anchor="middle" fill="#e8eaff">프레임워크</text></g>
    <g transform="translate(156,0)"><rect width="80" height="50" rx="12" fill="#fff" opacity="0.08"/><text x="40" y="33" text-anchor="middle" fill="#e8eaff">PRD</text></g>
    <g transform="translate(252,0)"><rect width="140" height="50" rx="12" fill="#6366f1" opacity="0.25"/><text x="70" y="33" text-anchor="middle" fill="#e0e7ff">목업 데이터</text></g>
    <g transform="translate(408,0)"><rect width="80" height="50" rx="12" fill="#fff" opacity="0.08"/><text x="40" y="33" text-anchor="middle" fill="#e8eaff">API</text></g>
  </g>

  <text x="1120" y="560" text-anchor="end" font-size="30" font-weight="800" fill="#fff" opacity="0.85">NEXT X</text>
</svg>
