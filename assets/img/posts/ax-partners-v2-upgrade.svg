  <text x="60" y="545" fill="#fff" fill-opacity="0.7" font-size="18">명부 교체와 스키마 유연화 — 납품 후 첫 번째 업그레이드</text>
  <text x="60" y="580" fill="#c4b5fd" font-size="14">NEXT X AX Solution · KJ Partners · Series #4</text>
