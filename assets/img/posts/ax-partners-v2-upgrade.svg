    <rect x="110" y="0" width="115" height="26" rx="13" fill="#fff" fill-opacity="0.08" stroke="#fff" stroke-opacity="0.12"/>
    <text x="167" y="17" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">Schema Migration</text>
    <rect x="235" y="0" width="90" height="26" rx="13" fill="#fff" fill-opacity="0.08" stroke="#fff" stroke-opacity="0.12"/>
    <text x="280" y="17" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">Bulk Import</text>
    <rect x="335" y="0" width="75" height="26" rx="13" fill="#fff" fill-opacity="0.08" stroke="#fff" stroke-opacity="0.12"/>
    <text x="372" y="17" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">Node.js</text>
    <rect x="420" y="0" width="68" height="26" rx="13" fill="#fff" fill-opacity="0.08" stroke="#fff" stroke-opacity="0.12"/>
    <text x="454" y="17" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">Vercel</text>
