    <text x="80" y="52" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">v1 Production</text>
    <text x="80" y="68" text-anchor="middle" fill="#93c5fd" font-size="9">57명 / NOT NULL</text>
  </g>

