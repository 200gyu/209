    <text x="150" y="84" fill="#fff" fill-opacity="0.2" font-size="10" font-style="italic">연락처 미입력</text>
    <text x="310" y="84" fill="#fff" fill-opacity="0.2" font-size="10" font-style="italic">지역 미입력</text>
    <text x="400" y="84" fill="#fff" fill-opacity="0.4" font-size="11">정리수납</text>
    <!-- Row 2 -->
    <text x="35" y="106" fill="#fff" fill-opacity="0.8" font-size="11">김경숙1</text>
    <text x="150" y="106" fill="#fff" fill-opacity="0.2" font-size="10" font-style="italic">연락처 미입력</text>
    <text x="310" y="106" fill="#fff" fill-opacity="0.2" font-size="10" font-style="italic">지역 미입력</text>
    <text x="400" y="106" fill="#fff" fill-opacity="0.4" font-size="11">정리수납</text>
    <!-- Row 3 -->
    <text x="35" y="128" fill="#22c55e" fill-opacity="0.8" font-size="11">강지현 (NEW)</text>
    <text x="150" y="128" fill="#fff" fill-opacity="0.2" font-size="10" font-style="italic">연락처 미입력</text>
    <text x="310" y="128" fill="#fff" fill-opacity="0.2" font-size="10" font-style="italic">지역 미입력</text>
    <text x="400" y="128" fill="#fff" fill-opacity="0.4" font-size="11">정리수납</text>
