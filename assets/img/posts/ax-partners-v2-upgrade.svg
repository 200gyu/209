    <text x="150" y="128" fill="#ef4444" fill-opacity="0.5" font-size="11">000-0000-0000</text>
    <text x="310" y="128" fill="#fff" fill-opacity="0.5" font-size="11">제주</text>
    <text x="400" y="128" fill="#fff" fill-opacity="0.4" font-size="11">정리수납</text>
