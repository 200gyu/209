    <text x="80" y="52" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Bulk Import</text>
    <text x="80" y="68" text-anchor="middle" fill="#c4b5fd" font-size="9">DELETE + INSERT 71</text>
