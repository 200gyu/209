<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(80,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(160,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(240,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(320,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(400,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(480,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(560,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(640,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(720,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(800,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(880,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(960,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(1040,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(1120,0)" />
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,80)" />
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,160)" />
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,240)" />
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,320)" />
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,400)" />
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,480)" />
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,560)" />
  </g>

  <!-- Browser window mockup -->
  <g transform="translate(580, 100)">
    <rect x="0" y="0" width="520" height="420" rx="16" fill="url(#card)" stroke="#fff" stroke-opacity="0.2" stroke-width="1.5"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="520" height="40" rx="16" fill="#ffffff" fill-opacity="0.1"/>
    <rect x="0" y="30" width="520" height="10" fill="#ffffff" fill-opacity="0.1"/>
    <circle cx="24" cy="20" r="6" fill="#ff5f57"/>
    <circle cx="44" cy="20" r="6" fill="#febc2e"/>
    <circle cx="64" cy="20" r="6" fill="#28c840"/>
    <text x="260" y="25" text-anchor="middle" fill="#fff" fill-opacity="0.6" font-size="12">partners-manager-omega.vercel.app</text>

    <!-- App header -->
    <rect x="20" y="55" width="480" height="45" rx="8" fill="#fff" fill-opacity="0.08"/>
    <text x="40" y="83" fill="#fff" font-size="16" font-weight="700">🤝 Partners Manager</text>
    <circle cx="468" cy="78" r="5" fill="#34d399"/>

    <!-- Tab buttons -->
    <rect x="20" y="115" width="120" height="32" rx="10" fill="#fff" fill-opacity="0.25"/>
    <text x="80" y="136" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">👤 Partner</text>
    <rect x="150" y="115" width="120" height="32" rx="10" fill="#fff" fill-opacity="0.08"/>
    <text x="210" y="136" text-anchor="middle" fill="#fff" fill-opacity="0.6" font-size="12">📋 Assignment</text>

    <!-- Partner cards -->
    <rect x="20" y="165" width="230" height="100" rx="12" fill="#fff" fill-opacity="0.1" stroke="#fff" stroke-opacity="0.1"/>
    <text x="40" y="195" fill="#fff" font-size="14" font-weight="600">Kim</text>
    <rect x="75" y="182" width="50" height="20" rx="10" fill="#34d399" fill-opacity="0.3"/>
    <text x="100" y="196" text-anchor="middle" fill="#34d399" font-size="10">Active</text>
    <text x="40" y="218" fill="#fff" fill-opacity="0.5" font-size="11">📍 Seoul Gangseo</text>
    <text x="40" y="238" fill="#fff" fill-opacity="0.5" font-size="11">📞 010-1234-5678</text>

    <rect x="268" y="165" width="230" height="100" rx="12" fill="#fff" fill-opacity="0.1" stroke="#fff" stroke-opacity="0.1"/>
    <text x="288" y="195" fill="#fff" font-size="14" font-weight="600">Lee</text>
    <rect x="318" y="182" width="50" height="20" rx="10" fill="#34d399" fill-opacity="0.3"/>
    <text x="343" y="196" text-anchor="middle" fill="#34d399" font-size="10">Active</text>
    <text x="288" y="218" fill="#fff" fill-opacity="0.5" font-size="11">📍 Seoul Mapo</text>
    <text x="288" y="238" fill="#fff" fill-opacity="0.5" font-size="11">📞 010-2345-6789</text>

    <!-- Assignment card -->
    <rect x="20" y="283" width="480" height="110" rx="12" fill="#fff" fill-opacity="0.1" stroke="#fff" stroke-opacity="0.1"/>
    <text x="40" y="315" fill="#fff" font-size="14" font-weight="600">Hong</text>
    <rect x="80" y="302" width="40" height="18" rx="9" fill="#fbbf24" fill-opacity="0.3"/>
    <text x="100" y="315" text-anchor="middle" fill="#fbbf24" font-size="9">대기</text>
    <text x="40" y="340" fill="#fff" fill-opacity="0.5" font-size="11">📍 Seoul Gangseo Hwagok</text>
    <text x="40" y="358" fill="#fff" fill-opacity="0.5" font-size="11">📅 2026-07-20  👤 Kim</text>
    <rect x="40" y="368" width="80" height="22" rx="6" fill="#3b82f6" fill-opacity="0.3"/>
    <text x="80" y="383" text-anchor="middle" fill="#93c5fd" font-size="10">✅ Complete</text>
    <rect x="130" y="368" width="60" height="22" rx="6" fill="#ef4444" fill-opacity="0.2"/>
    <text x="160" y="383" text-anchor="middle" fill="#fca5a5" font-size="10">🗑️ Del</text>
  </g>

  <!-- Architecture diagram on left -->
  <g transform="translate(60, 120)">
    <!-- Frontend box -->
    <rect x="0" y="0" width="180" height="70" rx="12" fill="#fff" fill-opacity="0.12" stroke="#fff" stroke-opacity="0.25" stroke-width="1.5"/>
    <text x="90" y="30" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Frontend</text>
    <text x="90" y="50" text-anchor="middle" fill="#fff" fill-opacity="0.6" font-size="11">Vite + Tailwind CSS</text>

    <!-- Arrow down -->
    <line x1="90" y1="70" x2="90" y2="120" stroke="#fff" stroke-opacity="0.4" stroke-width="2" stroke-dasharray="6,4"/>
    <polygon points="82,115 98,115 90,128" fill="#fff" fill-opacity="0.4"/>
    <text x="130" y="100" fill="#a5b4fc" font-size="10">REST API</text>

    <!-- Supabase box -->
    <rect x="0" y="130" width="180" height="70" rx="12" fill="#3ecf8e" fill-opacity="0.2" stroke="#3ecf8e" stroke-opacity="0.5" stroke-width="1.5"/>
    <text x="90" y="160" text-anchor="middle" fill="#3ecf8e" font-size="13" font-weight="700">Supabase</text>
    <text x="90" y="180" text-anchor="middle" fill="#fff" fill-opacity="0.6" font-size="11">PostgreSQL + RLS</text>

    <!-- Arrow down -->
    <line x1="90" y1="200" x2="90" y2="250" stroke="#fff" stroke-opacity="0.4" stroke-width="2" stroke-dasharray="6,4"/>
    <polygon points="82,245 98,245 90,258" fill="#fff" fill-opacity="0.4"/>

    <!-- Security box -->
    <rect x="0" y="260" width="180" height="70" rx="12" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-opacity="0.4" stroke-width="1.5"/>
    <text x="90" y="290" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="700">🔒 Security</text>
    <text x="90" y="310" text-anchor="middle" fill="#fff" fill-opacity="0.6" font-size="11">.env + RLS + XSS</text>

    <!-- Deploy box -->
    <rect x="220" y="130" width="180" height="70" rx="12" fill="#fff" fill-opacity="0.12" stroke="#fff" stroke-opacity="0.25" stroke-width="1.5"/>
    <text x="310" y="155" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">Deploy</text>
    <text x="310" y="175" text-anchor="middle" fill="#fff" fill-opacity="0.6" font-size="11">GitHub Pages</text>

    <!-- Arrow from Supabase to Deploy -->
    <line x1="180" y1="165" x2="220" y2="165" stroke="#fff" stroke-opacity="0.3" stroke-width="1.5"/>
    <polygon points="215,160 215,170 225,165" fill="#fff" fill-opacity="0.3"/>

    <!-- Arrow from Frontend to Deploy -->
    <line x1="180" y1="35" x2="310" y2="35" stroke="#fff" stroke-opacity="0.3" stroke-width="1.5"/>
    <line x1="310" y1="35" x2="310" y2="130" stroke="#fff" stroke-opacity="0.3" stroke-width="1.5"/>
    <polygon points="305,125 315,125 310,135" fill="#fff" fill-opacity="0.3"/>
  </g>

  <!-- Title text -->
  <text x="60" y="520" fill="#fff" font-size="32" font-weight="800" letter-spacing="-0.5">내 서비스에 백엔드 한 겹 붙이기</text>
  <text x="60" y="560" fill="#fff" fill-opacity="0.7" font-size="18">파트너스 매칭 매니저 — Vite + Supabase + GitHub Pages</text>
  <text x="60" y="590" fill="#a5b4fc" font-size="14">AIFFEL AI Agent 1기 · 프로젝트 제작기</text>
</svg>
