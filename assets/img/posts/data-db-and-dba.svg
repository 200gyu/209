    <circle cx="40" cy="40" r="2" fill="#fff"/><circle cx="120" cy="40" r="2" fill="#fff"/><circle cx="200" cy="40" r="2" fill="#fff"/><circle cx="280" cy="40" r="2" fill="#fff"/><circle cx="360" cy="40" r="2" fill="#fff"/><circle cx="440" cy="40" r="2" fill="#fff"/><circle cx="520" cy="40" r="2" fill="#fff"/><circle cx="600" cy="40" r="2" fill="#fff"/><circle cx="680" cy="40" r="2" fill="#fff"/><circle cx="760" cy="40" r="2" fill="#fff"/><circle cx="840" cy="40" r="2" fill="#fff"/><circle cx="920" cy="40" r="2" fill="#fff"/><circle cx="1000" cy="40" r="2" fill="#fff"/><circle cx="1080" cy="40" r="2" fill="#fff"/><circle cx="1160" cy="40" r="2" fill="#fff"/>
    <circle cx="40" cy="120" r="2" fill="#fff"/><circle cx="120" cy="120" r="2" fill="#fff"/><circle cx="200" cy="120" r="2" fill="#fff"/><circle cx="280" cy="120" r="2" fill="#fff"/><circle cx="360" cy="120" r="2" fill="#fff"/><circle cx="440" cy="120" r="2" fill="#fff"/><circle cx="520" cy="120" r="2" fill="#fff"/><circle cx="600" cy="120" r="2" fill="#fff"/><circle cx="680" cy="120" r="2" fill="#fff"/><circle cx="760" cy="120" r="2" fill="#fff"/><circle cx="840" cy="120" r="2" fill="#fff"/><circle cx="920" cy="120" r="2" fill="#fff"/><circle cx="1000" cy="120" r="2" fill="#fff"/><circle cx="1080" cy="120" r="2" fill="#fff"/><circle cx="1160" cy="120" r="2" fill="#fff"/>
    <circle cx="40" cy="200" r="2" fill="#fff"/><circle cx="120" cy="200" r="2" fill="#fff"/><circle cx="200" cy="200" r="2" fill="#fff"/><circle cx="280" cy="200" r="2" fill="#fff"/><circle cx="360" cy="200" r="2" fill="#fff"/><circle cx="440" cy="200" r="2" fill="#fff"/><circle cx="520" cy="200" r="2" fill="#fff"/><circle cx="600" cy="200" r="2" fill="#fff"/><circle cx="680" cy="200" r="2" fill="#fff"/><circle cx="760" cy="200" r="2" fill="#fff"/><circle cx="840" cy="200" r="2" fill="#fff"/><circle cx="920" cy="200" r="2" fill="#fff"/><circle cx="1000" cy="200" r="2" fill="#fff"/><circle cx="1080" cy="200" r="2" fill="#fff"/><circle cx="1160" cy="200" r="2" fill="#fff"/>
    <circle cx="40" cy="280" r="2" fill="#fff"/><circle cx="120" cy="280" r="2" fill="#fff"/><circle cx="200" cy="280" r="2" fill="#fff"/><circle cx="280" cy="280" r="2" fill="#fff"/><circle cx="360" cy="280" r="2" fill="#fff"/><circle cx="440" cy="280" r="2" fill="#fff"/><circle cx="520" cy="280" r="2" fill="#fff"/><circle cx="600" cy="280" r="2" fill="#fff"/><circle cx="680" cy="280" r="2" fill="#fff"/><circle cx="760" cy="280" r="2" fill="#fff"/><circle cx="840" cy="280" r="2" fill="#fff"/><circle cx="920" cy="280" r="2" fill="#fff"/><circle cx="1000" cy="280" r="2" fill="#fff"/><circle cx="1080" cy="280" r="2" fill="#fff"/><circle cx="1160" cy="280" r="2" fill="#fff"/>
