    <rect x="0" y="0" width="110" height="30" rx="15" fill="#fff" fill-opacity="0.1" stroke="#fff" stroke-opacity="0.2"/>
    <text x="55" y="20" text-anchor="middle" fill="#5eead4" font-size="11" font-weight="600">Performance</text>
    <rect x="120" y="0" width="90" height="30" rx="15" fill="#fff" fill-opacity="0.1" stroke="#fff" stroke-opacity="0.2"/>
    <text x="165" y="20" text-anchor="middle" fill="#5eead4" font-size="11" font-weight="600">Security</text>
    <rect x="0" y="40" width="95" height="30" rx="15" fill="#fff" fill-opacity="0.1" stroke="#fff" stroke-opacity="0.2"/>
    <text x="47" y="60" text-anchor="middle" fill="#5eead4" font-size="11" font-weight="600">Backup</text>
    <rect x="105" y="40" width="105" height="30" rx="15" fill="#fff" fill-opacity="0.1" stroke="#fff" stroke-opacity="0.2"/>
    <text x="157" y="60" text-anchor="middle" fill="#5eead4" font-size="11" font-weight="600">Migration</text>
  </g>

  <!-- App icons connecting to main DB -->
  <g transform="translate(60, 380)">
    <rect x="0" y="0" width="80" height="50" rx="10" fill="#fff" fill-opacity="0.08" stroke="#fff" stroke-opacity="0.15"/>
    <text x="40" y="32" text-anchor="middle" fill="#fff" fill-opacity="0.6" font-size="11">Web App</text>
    <rect x="100" y="0" width="80" height="50" rx="10" fill="#fff" fill-opacity="0.08" stroke="#fff" stroke-opacity="0.15"/>
    <text x="140" y="32" text-anchor="middle" fill="#fff" fill-opacity="0.6" font-size="11">Mobile</text>
    <rect x="200" y="0" width="80" height="50" rx="10" fill="#fff" fill-opacity="0.08" stroke="#fff" stroke-opacity="0.15"/>
    <text x="240" y="32" text-anchor="middle" fill="#fff" fill-opacity="0.6" font-size="11">API</text>
