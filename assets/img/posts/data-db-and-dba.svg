  <line x1="740" y1="240" x2="780" y2="140" stroke="#fff" stroke-opacity="0.2" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="740" y1="260" x2="900" y2="180" stroke="#fff" stroke-opacity="0.2" stroke-width="1.5" stroke-dasharray="6,4"/>

