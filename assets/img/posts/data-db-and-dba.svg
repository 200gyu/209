    <circle cx="40" cy="440" r="2" fill="#fff"/><circle cx="120" cy="440" r="2" fill="#fff"/><circle cx="200" cy="440" r="2" fill="#fff"/><circle cx="280" cy="440" r="2" fill="#fff"/><circle cx="360" cy="440" r="2" fill="#fff"/><circle cx="440" cy="440" r="2" fill="#fff"/><circle cx="520" cy="440" r="2" fill="#fff"/><circle cx="600" cy="440" r="2" fill="#fff"/><circle cx="680" cy="440" r="2" fill="#fff"/><circle cx="760" cy="440" r="2" fill="#fff"/><circle cx="840" cy="440" r="2" fill="#fff"/><circle cx="920" cy="440" r="2" fill="#fff"/><circle cx="1000" cy="440" r="2" fill="#fff"/><circle cx="1080" cy="440" r="2" fill="#fff"/><circle cx="1160" cy="440" r="2" fill="#fff"/>
