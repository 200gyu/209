<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR','Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1030"/>
      <stop offset="0.55" stop-color="#1e1a4d"/>
      <stop offset="1" stop-color="#2a1246"/>
    </linearGradient>
    <radialGradient id="glow" cx="82%" cy="14%" r="70%">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#ffffff" opacity="0.06"/>
    </pattern>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b9bff"/>
      <stop offset="0.5" stop-color="#c4a7ff"/>
      <stop offset="1" stop-color="#67e8f9"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- category pill -->
  <g transform="translate(80,96)">
    <rect x="0" y="0" width="176" height="48" rx="24" fill="#6d5efc" opacity="0.2"/>
    <text x="88" y="32" text-anchor="middle" font-size="24" font-weight="700" fill="#b6a9ff">수업노트</text>
  </g>

  <!-- title -->
  <text x="80" y="278" font-size="78" font-weight="800" fill="#ffffff">Computational Thinking</text>
  <text x="80" y="362" font-size="40" font-weight="600" fill="url(#accent)">컴퓨터처럼 사고하는 법</text>

  <!-- 4 pillars -->
  <g transform="translate(80,430)" font-size="26" font-weight="700">
    <g><rect x="0" y="0" width="150" height="54" rx="12" fill="#ffffff" opacity="0.08"/><text x="75" y="35" text-anchor="middle" fill="#e8eaff">🧩 분해</text></g>
    <g transform="translate(166,0)"><rect x="0" y="0" width="150" height="54" rx="12" fill="#ffffff" opacity="0.08"/><text x="75" y="35" text-anchor="middle" fill="#e8eaff">🔁 패턴</text></g>
    <g transform="translate(332,0)"><rect x="0" y="0" width="150" height="54" rx="12" fill="#ffffff" opacity="0.08"/><text x="75" y="35" text-anchor="middle" fill="#e8eaff">🎯 추상화</text></g>
    <g transform="translate(498,0)"><rect x="0" y="0" width="180" height="54" rx="12" fill="#ffffff" opacity="0.08"/><text x="90" y="35" text-anchor="middle" fill="#e8eaff">⚙️ 알고리즘</text></g>
  </g>

  <text x="1120" y="560" text-anchor="end" font-size="34" font-weight="800" fill="#ffffff" opacity="0.9">209</text>
</svg>
