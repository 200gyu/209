    <text x="35" y="15" text-anchor="middle" fill="#3ecf8e" font-size="9" font-weight="600">Supabase</text>
    <rect x="80" y="0" width="55" height="22" rx="11" fill="#38bdf8" fill-opacity="0.2" stroke="#38bdf8" stroke-opacity="0.3"/>
    <text x="107" y="15" text-anchor="middle" fill="#38bdf8" font-size="9" font-weight="600">Tailwind</text>
    <rect x="145" y="0" width="90" height="22" rx="11" fill="#a78bfa" fill-opacity="0.2" stroke="#a78bfa" stroke-opacity="0.3"/>
    <text x="190" y="15" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="600">Vanilla JS</text>
