<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="40%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.03"/>
    </linearGradient>
    <linearGradient id="emerald" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#f87171"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="72" text-anchor="middle" fill="#ffffff" font-size="40" font-weight="800" letter-spacing="-0.5">백엔드 개발자의 세계</text>
  <text x="600" y="112" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="18">"사용자가 모르는 모든 것"을 만드는 사람들</text>

  <!-- Server rack mockup (center) -->
  <rect x="420" y="150" width="360" height="340" rx="14" fill="#111827" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <!-- Server top -->
  <rect x="440" y="165" width="320" height="40" rx="6" fill="rgba(5,150,105,0.1)" stroke="rgba(52,211,153,0.2)" stroke-width="1"/>
  <circle cx="465" cy="185" r="4" fill="#34d399"/><circle cx="480" cy="185" r="4" fill="#34d399"/><circle cx="495" cy="185" r="4" fill="#fbbf24"/>
  <text x="535" y="190" fill="rgba(255,255,255,0.5)" font-size="10" font-weight="600">API Server</text>
  <rect x="700" y="176" width="45" height="16" rx="3" fill="rgba(52,211,153,0.15)"/>
  <text x="722" y="188" text-anchor="middle" fill="#34d399" font-size="8">ONLINE</text>

  <!-- Server middle -->
  <rect x="440" y="215" width="320" height="40" rx="6" fill="rgba(37,99,235,0.1)" stroke="rgba(96,165,250,0.2)" stroke-width="1"/>
  <circle cx="465" cy="235" r="4" fill="#60a5fa"/><circle cx="480" cy="235" r="4" fill="#60a5fa"/><circle cx="495" cy="235" r="4" fill="#60a5fa"/>
  <text x="535" y="240" fill="rgba(255,255,255,0.5)" font-size="10" font-weight="600">Database</text>
  <rect x="700" y="226" width="45" height="16" rx="3" fill="rgba(96,165,250,0.15)"/>
  <text x="722" y="238" text-anchor="middle" fill="#60a5fa" font-size="8">ACTIVE</text>

  <!-- Server bottom -->
  <rect x="440" y="265" width="320" height="40" rx="6" fill="rgba(217,119,6,0.1)" stroke="rgba(251,191,36,0.2)" stroke-width="1"/>
  <circle cx="465" cy="285" r="4" fill="#fbbf24"/><circle cx="480" cy="285" r="4" fill="#34d399"/><circle cx="495" cy="285" r="4" fill="#34d399"/>
  <text x="535" y="290" fill="rgba(255,255,255,0.5)" font-size="10" font-weight="600">Auth Service</text>
  <rect x="700" y="276" width="45" height="16" rx="3" fill="rgba(251,191,36,0.15)"/>
  <text x="722" y="288" text-anchor="middle" fill="#fbbf24" font-size="8">READY</text>

  <!-- Terminal/logs area -->
  <rect x="440" y="320" width="320" height="155" rx="6" fill="#0d1117" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="460" y="342" fill="#8b949e" font-size="9" font-family="monospace">$</text>
  <text x="475" y="342" fill="#34d399" font-size="9" font-family="monospace">GET /api/partners 200 OK 12ms</text>
  <text x="460" y="358" fill="#8b949e" font-size="9" font-family="monospace">$</text>
  <text x="475" y="358" fill="#34d399" font-size="9" font-family="monospace">POST /api/assignments 201 Created 45ms</text>
  <text x="460" y="374" fill="#8b949e" font-size="9" font-family="monospace">$</text>
  <text x="475" y="374" fill="#fbbf24" font-size="9" font-family="monospace">AUTH jwt_verify user=admin@kj.co.kr</text>
  <text x="460" y="390" fill="#8b949e" font-size="9" font-family="monospace">$</text>
  <text x="475" y="390" fill="#60a5fa" font-size="9" font-family="monospace">QUERY partners SELECT * ORDER BY name</text>
  <text x="460" y="406" fill="#8b949e" font-size="9" font-family="monospace">$</text>
  <text x="475" y="406" fill="#34d399" font-size="9" font-family="monospace">RLS policy_check role=authenticated OK</text>
  <text x="460" y="422" fill="#8b949e" font-size="9" font-family="monospace">$</text>
  <text x="475" y="422" fill="#f87171" font-size="9" font-family="monospace">WARN rate_limit 429 ip=192.168.1.42</text>
  <text x="460" y="438" fill="#8b949e" font-size="9" font-family="monospace">$</text>
  <text x="475" y="438" fill="#34d399" font-size="9" font-family="monospace">BACKUP daily_snapshot completed 3.2GB</text>
  <text x="460" y="458" fill="#6e7681" font-size="9" font-family="monospace">_ </text>

  <!-- Left side: request flow -->
  <rect x="50" y="170" width="340" height="130" rx="14" fill="url(#card)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="220" y="200" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="13" font-weight="700">Request Flow</text>

  <g transform="translate(70, 216)">
    <rect width="80" height="28" rx="14" fill="rgba(167,139,250,0.2)" stroke="rgba(167,139,250,0.4)" stroke-width="1"/>
    <text x="40" y="18" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">Client</text>
  </g>
  <text x="163" y="234" fill="rgba(255,255,255,0.3)" font-size="12">&#8594;</text>
  <g transform="translate(175, 216)">
    <rect width="70" height="28" rx="14" fill="rgba(52,211,153,0.2)" stroke="rgba(52,211,153,0.4)" stroke-width="1"/>
    <text x="35" y="18" text-anchor="middle" fill="#34d399" font-size="10" font-weight="600">Auth</text>
  </g>
  <text x="258" y="234" fill="rgba(255,255,255,0.3)" font-size="12">&#8594;</text>
  <g transform="translate(270, 216)">
    <rect width="70" height="28" rx="14" fill="rgba(96,165,250,0.2)" stroke="rgba(96,165,250,0.4)" stroke-width="1"/>
    <text x="35" y="18" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="600">Logic</text>
  </g>

  <g transform="translate(70, 256)">
    <rect width="70" height="28" rx="14" fill="rgba(251,191,36,0.2)" stroke="rgba(251,191,36,0.4)" stroke-width="1"/>
    <text x="35" y="18" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">DB</text>
  </g>
  <text x="153" y="274" fill="rgba(255,255,255,0.3)" font-size="12">&#8594;</text>
  <g transform="translate(165, 256)">
    <rect width="80" height="28" rx="14" fill="rgba(248,113,113,0.2)" stroke="rgba(248,113,113,0.4)" stroke-width="1"/>
    <text x="40" y="18" text-anchor="middle" fill="#f87171" font-size="10" font-weight="600">Validate</text>
  </g>
  <text x="258" y="274" fill="rgba(255,255,255,0.3)" font-size="12">&#8594;</text>
  <g transform="translate(270, 256)">
    <rect width="80" height="28" rx="14" fill="rgba(167,139,250,0.2)" stroke="rgba(167,139,250,0.4)" stroke-width="1"/>
    <text x="40" y="18" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">Response</text>
  </g>

  <!-- Right side: core responsibilities -->
  <rect x="810" y="170" width="340" height="310" rx="14" fill="url(#card)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="980" y="200" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="13" font-weight="700">Core Responsibilities</text>

  <g transform="translate(830, 216)">
    <circle cx="10" cy="10" r="10" fill="url(#emerald)" opacity="0.3"/>
    <text x="10" y="14" text-anchor="middle" fill="#34d399" font-size="10">1</text>
    <text x="28" y="15" fill="rgba(255,255,255,0.6)" font-size="11">API 설계 &amp; 구현</text>
  </g>
  <g transform="translate(830, 252)">
    <circle cx="10" cy="10" r="10" fill="url(#blue)" opacity="0.3"/>
    <text x="10" y="14" text-anchor="middle" fill="#60a5fa" font-size="10">2</text>
    <text x="28" y="15" fill="rgba(255,255,255,0.6)" font-size="11">데이터베이스 설계 &amp; 최적화</text>
  </g>
  <g transform="translate(830, 288)">
    <circle cx="10" cy="10" r="10" fill="url(#amber)" opacity="0.3"/>
    <text x="10" y="14" text-anchor="middle" fill="#fbbf24" font-size="10">3</text>
    <text x="28" y="15" fill="rgba(255,255,255,0.6)" font-size="11">인증 &amp; 보안</text>
  </g>
  <g transform="translate(830, 324)">
    <circle cx="10" cy="10" r="10" fill="url(#red)" opacity="0.3"/>
    <text x="10" y="14" text-anchor="middle" fill="#f87171" font-size="10">4</text>
    <text x="28" y="15" fill="rgba(255,255,255,0.6)" font-size="11">에러 처리 &amp; 로깅</text>
  </g>
  <g transform="translate(830, 360)">
    <circle cx="10" cy="10" r="10" fill="rgba(255,255,255,0.1)"/>
    <text x="10" y="14" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">5</text>
    <text x="28" y="15" fill="rgba(255,255,255,0.6)" font-size="11">확장성 &amp; 성능</text>
  </g>
  <g transform="translate(830, 396)">
    <circle cx="10" cy="10" r="10" fill="rgba(255,255,255,0.1)"/>
    <text x="10" y="14" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">6</text>
    <text x="28" y="15" fill="rgba(255,255,255,0.6)" font-size="11">배포 &amp; 인프라 (DevOps)</text>
  </g>

  <text x="980" y="450" text-anchor="middle" fill="rgba(52,211,153,0.5)" font-size="11" font-weight="600">"안정성 + 보안 + 확장성"</text>

  <!-- Left bottom: tech stack -->
  <rect x="50" y="330" width="340" height="150" rx="14" fill="url(#card)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="220" y="358" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="13" font-weight="700">Tech Stack</text>

  <rect x="70" y="372" width="65" height="24" rx="12" fill="rgba(52,211,153,0.15)" stroke="rgba(52,211,153,0.3)" stroke-width="1"/>
  <text x="102" y="388" text-anchor="middle" fill="#34d399" font-size="9" font-weight="600">Node.js</text>
  <rect x="143" y="372" width="60" height="24" rx="12" fill="rgba(96,165,250,0.15)" stroke="rgba(96,165,250,0.3)" stroke-width="1"/>
  <text x="173" y="388" text-anchor="middle" fill="#60a5fa" font-size="9" font-weight="600">Python</text>
  <rect x="211" y="372" width="45" height="24" rx="12" fill="rgba(248,113,113,0.15)" stroke="rgba(248,113,113,0.3)" stroke-width="1"/>
  <text x="233" y="388" text-anchor="middle" fill="#f87171" font-size="9" font-weight="600">Java</text>
  <rect x="264" y="372" width="40" height="24" rx="12" fill="rgba(167,139,250,0.15)" stroke="rgba(167,139,250,0.3)" stroke-width="1"/>
  <text x="284" y="388" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="600">Go</text>
  <rect x="312" y="372" width="60" height="24" rx="12" fill="rgba(251,191,36,0.15)" stroke="rgba(251,191,36,0.3)" stroke-width="1"/>
  <text x="342" y="388" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600">Rust</text>

  <rect x="70" y="404" width="80" height="24" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="110" y="420" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="9">PostgreSQL</text>
  <rect x="158" y="404" width="65" height="24" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="190" y="420" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="9">MongoDB</text>
  <rect x="231" y="404" width="55" height="24" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="258" y="420" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="9">Redis</text>
  <rect x="294" y="404" width="60" height="24" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="324" y="420" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="9">Docker</text>

  <rect x="70" y="436" width="55" height="24" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="97" y="452" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="9">AWS</text>
  <rect x="133" y="436" width="70" height="24" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="168" y="452" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="9">Supabase</text>
  <rect x="211" y="436" width="50" height="24" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="236" y="452" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="9">K8s</text>
  <rect x="269" y="436" width="50" height="24" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="294" y="452" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="9">CI/CD</text>

  <!-- Bottom bar -->
  <rect x="60" y="510" width="1080" height="1" fill="rgba(255,255,255,0.06)"/>
  <text x="600" y="548" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="16" font-weight="600">Backend = Data + Logic + Security + Infrastructure</text>

  <!-- Tech badges bottom -->
  <rect x="390" y="570" width="60" height="22" rx="11" fill="rgba(255,255,255,0.06)"/>
  <text x="420" y="585" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="9">API</text>
  <rect x="460" y="570" width="80" height="22" rx="11" fill="rgba(255,255,255,0.06)"/>
  <text x="500" y="585" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="9">Database</text>
  <rect x="550" y="570" width="70" height="22" rx="11" fill="rgba(255,255,255,0.06)"/>
  <text x="585" y="585" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="9">Security</text>
  <rect x="630" y="570" width="70" height="22" rx="11" fill="rgba(255,255,255,0.06)"/>
  <text x="665" y="585" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="9">DevOps</text>
  <rect x="710" y="570" width="80" height="22" rx="11" fill="rgba(255,255,255,0.06)"/>
  <text x="750" y="585" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="9">Scalability</text>

  <text x="1140" y="610" text-anchor="end" fill="rgba(255,255,255,0.2)" font-size="11">NEXT X R&amp;D</text>
</svg>