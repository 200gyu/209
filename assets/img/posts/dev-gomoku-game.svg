<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR','Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0d1326"/><stop offset="0.5" stop-color="#161d3a"/><stop offset="1" stop-color="#1e1a44"/></linearGradient>
    <radialGradient id="glow" cx="80%" cy="10%" r="72%"><stop offset="0" stop-color="#6366f1" stop-opacity="0.5"/><stop offset="1" stop-color="#6366f1" stop-opacity="0"/></radialGradient>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.6" fill="#fff" opacity="0.06"/></pattern>
    <linearGradient id="ac" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#a5b4fc"/><stop offset="1" stop-color="#7dd3fc"/></linearGradient>
    <radialGradient id="black-stone" cx="35%" cy="30%" r="60%"><stop offset="0" stop-color="#555"/><stop offset="1" stop-color="#111"/></radialGradient>
    <radialGradient id="white-stone" cx="35%" cy="30%" r="60%"><stop offset="0" stop-color="#fff"/><stop offset="1" stop-color="#bbb"/></radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Mini board illustration -->
  <g transform="translate(880,100)" opacity="0.35">
    <rect x="-10" y="-10" width="260" height="260" rx="8" fill="#E6A15C" opacity="0.6"/>
    <g stroke="#3a2a10" stroke-width="1" opacity="0.7">
      <line x1="0" y1="0" x2="240" y2="0"/><line x1="0" y1="48" x2="240" y2="48"/>
      <line x1="0" y1="96" x2="240" y2="96"/><line x1="0" y1="144" x2="240" y2="144"/>
      <line x1="0" y1="192" x2="240" y2="192"/><line x1="0" y1="240" x2="240" y2="240"/>
      <line x1="0" y1="0" x2="0" y2="240"/><line x1="48" y1="0" x2="48" y2="240"/>
      <line x1="96" y1="0" x2="96" y2="240"/><line x1="144" y1="0" x2="144" y2="240"/>
      <line x1="192" y1="0" x2="192" y2="240"/><line x1="240" y1="0" x2="240" y2="240"/>
    </g>
    <circle cx="96" cy="96" r="18" fill="url(#black-stone)"/>
    <circle cx="144" cy="96" r="18" fill="url(#white-stone)"/>
    <circle cx="144" cy="144" r="18" fill="url(#black-stone)"/>
    <circle cx="96" cy="144" r="18" fill="url(#white-stone)"/>
    <circle cx="192" cy="48" r="18" fill="url(#black-stone)"/>
    <circle cx="48" cy="192" r="18" fill="url(#white-stone)"/>
    <circle cx="192" cy="192" r="18" fill="url(#black-stone)"/>
  </g>

  <g transform="translate(80,90)"><rect width="190" height="48" rx="24" fill="#6366f1" opacity="0.22"/><text x="95" y="32" text-anchor="middle" font-size="23" font-weight="700" fill="#c7d2fe">🛠️ Dev &amp; DevOps</text></g>
  <text x="80" y="248" font-size="62" font-weight="800" fill="#fff">관심사의 분리를 몸으로 익히다</text>
  <text x="80" y="335" font-size="52" font-weight="800" fill="url(#ac)">오목 웹 게임 만들기</text>
  <text x="80" y="405" font-size="28" font-weight="500" fill="#aab0d6">HTML·CSS·JS 3파일 분리 → GitHub Pages 배포까지</text>

  <g transform="translate(80,458)" font-size="22" font-weight="700">
    <g><rect width="100" height="50" rx="12" fill="#fff" opacity="0.08"/><text x="50" y="33" text-anchor="middle" fill="#e8eaff">HTML</text></g>
    <g transform="translate(116,0)"><rect width="90" height="50" rx="12" fill="#fff" opacity="0.08"/><text x="45" y="33" text-anchor="middle" fill="#e8eaff">CSS</text></g>
    <g transform="translate(222,0)"><rect width="140" height="50" rx="12" fill="#fff" opacity="0.08"/><text x="70" y="33" text-anchor="middle" fill="#e8eaff">JavaScript</text></g>
    <g transform="translate(378,0)"><rect width="170" height="50" rx="12" fill="#6366f1" opacity="0.25"/><text x="85" y="33" text-anchor="middle" fill="#e0e7ff">GitHub Pages</text></g>
  </g>

  <text x="1120" y="560" text-anchor="end" font-size="30" font-weight="800" fill="#fff" opacity="0.85">NEXT X</text>
</svg>
