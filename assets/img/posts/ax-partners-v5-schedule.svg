      <rect x="8" y="22" width="40" height="6" rx="2" fill="#fef3c7" fill-opacity="0.5"/>
      <rect x="8" y="31" width="55" height="6" rx="2" fill="#dbeafe" fill-opacity="0.5"/>
      <rect x="8" y="40" width="35" height="6" rx="2" fill="#f3f4f6" fill-opacity="0.4"/>
