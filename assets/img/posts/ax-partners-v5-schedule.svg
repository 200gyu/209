    <text x="185" y="145" text-anchor="middle" fill="#6ee7b7" font-size="9" font-weight="600">&#xD734;&#xBB34; + &#xBC30;&#xC815; + &#xC0C1;&#xD0DC;&#xBCC4; &#xC0C9;&#xC0C1; &#x2192; &#xD55C;&#xB208;&#xC5D0; &#xD30C;&#xC545;</text>
