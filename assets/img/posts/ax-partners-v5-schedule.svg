      <text x="14" y="42" fill="#d97706" font-size="5.5">[&#xB300;&#xAE30;] &#xBC15;&#xACE0;&#xAC1D; - &#xC81C;&#xC8FC;</text>
      <rect x="10" y="46" width="90" height="8" rx="2" fill="#dbeafe" fill-opacity="0.6"/>
      <text x="14" y="53" fill="#2563eb" font-size="5.5">[&#xC644;&#xB8CC;] &#xC774;&#xACE0;&#xAC1D; - &#xAC15;&#xC11C;</text>

      <rect x="110" y="24" width="90" height="8" rx="2" fill="#ffe4e6" fill-opacity="0.6"/>
      <text x="114" y="31" fill="#f87171" font-size="5.5">[&#xD734;&#xBB34;] &#xCC9C;&#xC608;&#xD76C;</text>
      <rect x="110" y="35" width="90" height="8" rx="2" fill="#fef3c7" fill-opacity="0.6"/>
      <text x="114" y="42" fill="#d97706" font-size="5.5">[&#xB300;&#xAE30;] &#xCD5C;&#xACE0;&#xAC1D;</text>

      <rect x="210" y="24" width="90" height="8" rx="2" fill="#f3f4f6" fill-opacity="0.4"/>
      <text x="214" y="31" fill="#6b7280" font-size="5.5">[&#xC885;&#xB8CC;] &#xD55C;&#xACE0;&#xAC1D;</text>

